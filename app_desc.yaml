specVersion: 3
module:
  language: Python
  spec:
    processes:
      - name: web
        # -w 2: 2个worker进程，充分利用2核CPU，且任一worker崩溃不影响服务
        # --threads 2: 每个worker 2个线程，处理I/O密集的API请求（总并发: 2×2=4）
        # -k gthread: 使用线程模式worker class，比sync更适合I/O密集
        # --timeout 300: 请求超时5分钟（某些CMDB同步接口响应慢）
        # --graceful-timeout 30: 优雅关闭等待30秒
        # --max-requests 1000: 每个worker处理1000个请求后自动重启，防止内存泄漏
        # --max-requests-jitter 50: 抖动值，避免所有worker同时重启
        procCommand: gunicorn wsgi -w 2 --threads 4 -k gthread --timeout 300 --graceful-timeout 30 --max-requests 800 --max-requests-jitter 50 -b [::]:5000 --access-logfile - --error-logfile - --access-logformat '[%(h)s] %({request_id}i)s %(u)s %(t)s "%(r)s" %(s)s %(D)s %(b)s "%(f)s" "%(a)s"'
        services:
          - name: web
            exposedType:
              name: bk/http
            targetPort: 5000
            port: 80
      - name: beat
        procCommand: python manage.py celery beat -l info
      - name: worker-sync
        # 消费 default 和 sync 队列：轻量级定时任务 + CMDB数据同步任务
        # --concurrency=2: I/O密集型任务，2个子进程
        # --max-tasks-per-child=100: 同步任务较重，及时回收防止内存泄漏
        # --max-memory-per-child=200000: 同步任务可能处理大量数据，内存限制200MB
        procCommand: python manage.py celery worker -Q default,sync -l info --pool=prefork --concurrency=2 --max-tasks-per-child=1000 --max-memory-per-child=200000 -O fair --without-heartbeat --without-gossip --without-mingle
      - name: worker-job
        # 消费 job 队列：作业执行任务（轮询状态、获取日志、处理结果）
        # --concurrency=2: I/O密集型任务，2个子进程
        # --max-tasks-per-child=100: 作业任务较重，及时回收防止内存泄漏
        # --max-memory-per-child=200000: 作业任务可能处理大量日志数据，内存限制200MB
        procCommand: python manage.py celery worker -Q job -l info --pool=prefork --concurrency=2 --max-tasks-per-child=200 --max-memory-per-child=200000 -O fair --without-heartbeat --without-gossip --without-mingle
    hooks:
      preRelease:
        procCommand: "python manage.py migrate --no-input"